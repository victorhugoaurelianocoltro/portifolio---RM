<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,229,255,0.08)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,229,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  <ellipse cx="400" cy="300" rx="300" ry="200" fill="url(#glow)"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
</svg>
